<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Ollama Chat</title>
    <style>
        * { box-sizing: border-box; margin: 0; padding: 0; }

        body {
            font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', sans-serif;
            background: #0d1117;
            color: #c9d1d9;
            height: 100vh;
            display: flex;
            flex-direction: column;
        }

        .header {
            padding: 14px 20px;
            background: #161b22;
            border-bottom: 1px solid #30363d;
            display: flex;
            align-items: center;
            gap: 10px;
        }

        .header h1 { font-size: 16px; font-weight: 600; color: #f0f6fc; }

        .model-badge {
            background: #1f2937;
            border: 1px solid #30363d;
            padding: 3px 10px;
            border-radius: 20px;
            font-size: 12px;
            color: #58a6ff;
        }

        .chat-area {
            flex: 1;
            overflow-y: auto;
            padding: 20px;
            display: flex;
            flex-direction: column;
            gap: 14px;
        }

        .message {
            max-width: 75%;
            padding: 10px 14px;
            border-radius: 14px;
            line-height: 1.6;
            font-size: 14px;
            white-space: pre-wrap;
            word-break: break-word;
        }

        .message.user {
            align-self: flex-end;
            background: #1f6feb;
            color: #fff;
            border-bottom-right-radius: 4px;
        }

        .message.assistant {
            align-self: flex-start;
            background: #161b22;
            border: 1px solid #30363d;
            border-bottom-left-radius: 4px;
        }

        .message.file-notice {
            align-self: flex-end;
            background: #0d2818;
            border: 1px solid #238636;
            border-radius: 8px;
            font-size: 13px;
            color: #3fb950;
            padding: 8px 12px;
        }

        .thinking {
            align-self: flex-start;
            padding: 12px 16px;
            background: #161b22;
            border: 1px solid #30363d;
            border-radius: 18px;
            border-bottom-left-radius: 4px;
            display: flex;
            align-items: center;
            gap: 5px;
        }

        .thinking span {
            width: 7px;
            height: 7px;
            background: #6e7681;
            border-radius: 50%;
            display: inline-block;
            animation: bounce 1.2s infinite ease-in-out;
        }

        .thinking span:nth-child(1) { animation-delay: 0s; }
        .thinking span:nth-child(2) { animation-delay: 0.2s; }
        .thinking span:nth-child(3) { animation-delay: 0.4s; }

        @keyframes bounce {
            0%, 60%, 100% { transform: translateY(0); opacity: 0.4; }
            30%            { transform: translateY(-5px); opacity: 1; }
        }

        .input-area {
            padding: 14px 20px;
            background: #161b22;
            border-top: 1px solid #30363d;
        }

        .file-badge {
            display: flex;
            align-items: center;
            gap: 8px;
            padding: 7px 12px;
            background: #0d2818;
            border: 1px solid #238636;
            border-radius: 8px;
            margin-bottom: 10px;
            font-size: 13px;
            color: #3fb950;
        }

        .file-badge .remove-btn {
            margin-left: auto;
            background: none;
            border: none;
            color: #6e7681;
            cursor: pointer;
            font-size: 15px;
            padding: 0 2px;
            line-height: 1;
        }

        .file-badge .remove-btn:hover { color: #f85149; }

        .input-row {
            display: flex;
            gap: 8px;
            align-items: flex-end;
        }

        .icon-btn {
            background: #21262d;
            border: 1px solid #30363d;
            color: #8b949e;
            width: 40px;
            height: 40px;
            border-radius: 8px;
            cursor: pointer;
            font-size: 17px;
            display: flex;
            align-items: center;
            justify-content: center;
            flex-shrink: 0;
            transition: background 0.15s, color 0.15s;
        }

        .icon-btn:hover { background: #30363d; color: #c9d1d9; }

        textarea {
            flex: 1;
            background: #0d1117;
            border: 1px solid #30363d;
            color: #c9d1d9;
            border-radius: 8px;
            padding: 10px 12px;
            font-size: 14px;
            resize: none;
            min-height: 40px;
            max-height: 140px;
            font-family: inherit;
            outline: none;
            line-height: 1.5;
        }

        textarea:focus { border-color: #58a6ff; }
        textarea::placeholder { color: #6e7681; }

        .send-btn {
            background: #1f6feb;
            border: none;
            color: #fff;
            width: 40px;
            height: 40px;
            border-radius: 8px;
            cursor: pointer;
            font-size: 16px;
            display: flex;
            align-items: center;
            justify-content: center;
            flex-shrink: 0;
            transition: background 0.15s;
        }

        .send-btn:hover { background: #388bfd; }
        .send-btn:disabled { background: #21262d; color: #6e7681; cursor: not-allowed; }

        #file-input { display: none; }

        .chat-area::-webkit-scrollbar { width: 5px; }
        .chat-area::-webkit-scrollbar-track { background: transparent; }
        .chat-area::-webkit-scrollbar-thumb { background: #30363d; border-radius: 3px; }
    </style>
</head>
<body>
    <div class="header">
        <h1>Ollama Chat</h1>
        <span class="model-badge">gemma3:4b</span>
    </div>

    <div class="chat-area" id="chat"></div>

    <div class="input-area">
        <div id="file-badge" style="display:none" class="file-badge">
            <span>📎</span>
            <span id="file-name"></span>
            <button class="remove-btn" onclick="clearFile()" title="Remove">✕</button>
        </div>
        <div class="input-row">
            <button class="icon-btn" title="Attach file" onclick="document.getElementById('file-input').click()">📎</button>
            <input type="file" id="file-input" accept=".txt,.md,.py,.js,.ts,.html,.css,.json,.csv,.xml,.yaml,.yml,.log" onchange="handleFile(this)">
            <textarea id="msg" placeholder="Type a message… (Enter to send, Shift+Enter for newline)"
                onkeydown="handleKey(event)" oninput="autoResize(this)"></textarea>
            <button class="send-btn" id="send-btn" onclick="sendMessage()" title="Send">&#10148;</button>
        </div>
    </div>

    <script>
        let fileContent = null;
        let fileName = null;

        function autoResize(el) {
            el.style.height = 'auto';
            el.style.height = Math.min(el.scrollHeight, 140) + 'px';
        }

        function handleKey(e) {
            if (e.key === 'Enter' && !e.shiftKey) {
                e.preventDefault();
                sendMessage();
            }
        }

        async function handleFile(input) {
            const file = input.files[0];
            if (!file) return;
            const formData = new FormData();
            formData.append('file', file);
            try {
                const res = await fetch('/upload', { method: 'POST', body: formData });
                const data = await res.json();
                fileContent = data.content;
                fileName = data.filename;
                document.getElementById('file-name').textContent = fileName;
                document.getElementById('file-badge').style.display = 'flex';
                addMessage('file-notice', `📎 ${fileName} attached`);
            } catch {
                addMessage('assistant', '⚠️ Failed to read file.');
            }
            input.value = '';
        }

        function clearFile() {
            fileContent = null;
            fileName = null;
            document.getElementById('file-badge').style.display = 'none';
        }

        function addMessage(type, text) {
            const chat = document.getElementById('chat');
            const div = document.createElement('div');
            div.className = `message ${type}`;
            div.textContent = text;
            chat.appendChild(div);
            chat.scrollTop = chat.scrollHeight;
            return div;
        }

        async function sendMessage() {
            const input = document.getElementById('msg');
            const text = input.value.trim();
            if (!text) return;

            const btn = document.getElementById('send-btn');
            btn.disabled = true;

            let fullMessage = text;
            if (fileContent) {
                fullMessage = `File: ${fileName}\n\`\`\`\n${fileContent}\n\`\`\`\n\n${text}`;
                clearFile();
            }

            addMessage('user', text);
            input.value = '';
            input.style.height = 'auto';

            const thinking = document.createElement('div');
            thinking.className = 'thinking';
            thinking.innerHTML = '<span></span><span></span><span></span>';
            document.getElementById('chat').appendChild(thinking);
            document.getElementById('chat').scrollTop = document.getElementById('chat').scrollHeight;

            try {
                const res = await fetch('/chat', {
                    method: 'POST',
                    headers: { 'Content-Type': 'application/json' },
                    body: JSON.stringify(fullMessage)
                });
                const data = await res.json();
                thinking.remove();
                addMessage('assistant', data.response);
            } catch {
                thinking.remove();
                addMessage('assistant', '⚠️ Could not reach the server.');
            }

            btn.disabled = false;
            input.focus();
        }
    </script>
</body>
</html>
